name: Deploy PWA for iOS

on:
  push:
    branches: ["main"]

  # 允许手动在 GitHub 页面触发
  workflow_dispatch:

# 设置权限以允许推送到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './massage-mobile-app/package-lock.json'
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        working-directory: ./massage-mobile-app
        run: npm ci
      - name: Build with Vite
        working-directory: ./massage-mobile-app
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './massage-mobile-app/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
