name: Deploy PWA for iOS

on:
  push:
    branches: ["main"]

  # 允许手动在 GitHub 页面触发
  workflow_dispatch:

# 设置权限以允许推送到分支
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './massage-mobile-app/package-lock.json'
          
      - name: Install dependencies
        working-directory: ./massage-mobile-app
        run: npm ci
        
      - name: Build with Vite
        working-directory: ./massage-mobile-app
        run: npm run build
        
      - name: Deploy to GitHub Pages Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./massage-mobile-app/dist
